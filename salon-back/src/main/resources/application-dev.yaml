spring:
  datasource:
    # Fallback para desenvolvimento local sem Docker (mvn spring-boot:run manual).
    # Com Docker, o valor vem do .env via env_file e sobrescreve este.
    url: jdbc:postgresql://localhost:5432/salon_dev
    username: salon
    password: salon
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # spring.mail herdado do application.yaml via ${MAIL_*} — não repetir aqui.
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

security:
  jwt:
    secret: dev-secret-key-change-in-prod-must-be-at-least-256-bits-long!!
    access-token-expiration-ms: 900000       # 15 minutos
    refresh-token-expiration-ms: 604800000   # 7 dias

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.cristiane.salon: DEBUG
    org.springframework.security: DEBUG
