spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/salon_dev}
    username: ${DB_USER:salon}
    password: ${DB_PASS:salon}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # spring.mail herdado do application.yaml via ${MAIL_*} — não repetir aqui.
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

security:
  jwt:
    secret: dev-secret-key-change-in-prod-must-be-at-least-256-bits-long!!
    access-token-expiration-ms: 900000 # 15 minutos
    refresh-token-expiration-ms: 604800000 # 7 dias

ai:
  # Chave AES-256 (base64) que cifra a API key de IA armazenada em tb_ai_config — nunca em texto puro no banco.
  config-encryption-key: ZGV2LWFpLWVuY3J5cHRpb24ta2V5LTMyLWJ5dGVzISE=

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.cristiane.salon: DEBUG
    org.springframework.security: DEBUG
