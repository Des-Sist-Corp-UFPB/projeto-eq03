name: Continuous Deployment

on:
  push:
    branches:
      - main

# Permissões necessárias para publicar pacotes no GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Define as letras minúsculas para o nome do repositório para cumprir com as regras de nomes do Docker no GHCR
      - name: Downcase Repository Name
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Autentica no GitHub Container Registry utilizando as credenciais nativas
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Configura o Docker Buildx para otimizar as compilações e o gerenciamento de cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build e Push do Backend (Java)
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./salon-back
          file: ./salon-back/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/salon-back:latest
            ghcr.io/${{ env.REPO_LOWER }}/salon-back:${{ github.sha }}
          # Otimização de tempo usando cache nativo do GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build e Push do Frontend (Nginx/SPA)
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./salon-front
          file: ./salon-front/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/salon-front:latest
            ghcr.io/${{ env.REPO_LOWER }}/salon-front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
