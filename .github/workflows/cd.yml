name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: [self-hosted, dsc-selfhosted]
    outputs:
      repo_lower: ${{ steps.repo.outputs.repo_lower }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepara nome da imagem (lowercase e clean)
        id: repo
        run: |
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "IMAGE=ghcr.io/$REPO_LOWER:latest" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1

  deploy:
    name: Deploy na VPS do Professor
    needs: build-and-push
    runs-on: [self-hosted, dsc-selfhosted]
    steps:
      - name: Acionar Gatilho de Pull/Deploy no Servidor do Professor
        run: |
          mkdir -p ~/.ssh

          # Usando o nome correto do seu secret: SSH_KEY
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Usando o nome correto do seu secret: SSH_USER
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          rm -f ~/.ssh/deploy_key
