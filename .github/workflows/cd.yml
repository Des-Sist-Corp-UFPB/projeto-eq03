name: Continuous Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repository Name
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/salon-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conecta via SSH e Atualiza
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_DB_URL: ${{ secrets.DB_URL }}
          PROD_DB_USER: ${{ secrets.DB_USER }}
          PROD_DB_PASS: ${{ secrets.DB_PASS }}
          PROD_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PROD_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          PROD_MAIL_FROM: ${{ secrets.MAIL_FROM }}
          PROD_MAIL_BUSINESS: ${{ secrets.MAIL_BUSINESS }}
          PROD_APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: PROD_DB_URL,PROD_DB_USER,PROD_DB_PASS,PROD_JWT_SECRET,PROD_MAIL_PASSWORD,PROD_MAIL_FROM,PROD_MAIL_BUSINESS,PROD_APP_CORS_ALLOWED_ORIGINS
          script: |
            # IMAGE_REPO é resolvido em tempo de parse do YAML pelo GitHub Actions
            # ${{ github.repository }} -> 'Des-Sist-Corp-UFPB/projeto-eq03' -> lowercase inline
            IMAGE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            mkdir -p /app/sass-salon
            cd /app/sass-salon

            # Limpa env velho por garantia
            rm -f .env

            # Gera o arquivo .env dinamicamente para o Docker Compose
            echo "DB_URL=$PROD_DB_URL" >> .env
            echo "DB_USER=$PROD_DB_USER" >> .env
            echo "DB_PASS=$PROD_DB_PASS" >> .env
            echo "JWT_SECRET=$PROD_JWT_SECRET" >> .env
            echo "MAIL_API_URL=https://api.resend.com" >> .env
            echo "MAIL_PASSWORD=$PROD_MAIL_PASSWORD" >> .env
            echo "MAIL_FROM=$PROD_MAIL_FROM" >> .env
            echo "MAIL_BUSINESS=$PROD_MAIL_BUSINESS" >> .env
            echo "APP_CORS_ALLOWED_ORIGINS=$PROD_APP_CORS_ALLOWED_ORIGINS" >> .env
            echo "VITE_API_URL=/v1" >> .env
            echo "SPRING_PROFILES_ACTIVE=prod" >> .env
            echo "IMAGE_REPO=$IMAGE_REPO" >> .env

            # Cria docker-compose usando printf para garantir expansao correta de $IMAGE_REPO
            printf 'services:\n  salon-app:\n    image: ghcr.io/%s/salon-app:latest\n    container_name: salon-app\n    env_file:\n      - .env\n    ports:\n      - "80:8080"\n    restart: always\n    networks:\n      - salon-network\nvolumes: {}\nnetworks:\n  salon-network:\n    external: true\n' "$IMAGE_REPO" > docker-compose.prod.yml

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -af
