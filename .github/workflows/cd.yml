name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.repo.outputs.repo_lower }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepara nome da imagem (lowercase e clean)
        id: repo
        run: |
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]' | sed 's/projeto-//')
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "IMAGE=ghcr.io/$REPO_LOWER:latest" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS do Professor
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (Para pegar o docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Monta o ficheiro .env localmente no Runner
        env:
          PROD_DB_URL: ${{ secrets.DB_URL }}
          PROD_DB_USER: ${{ secrets.DB_USER }}
          PROD_DB_PASS: ${{ secrets.DB_PASS }}
          PROD_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PROD_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          PROD_MAIL_FROM: ${{ secrets.MAIL_FROM }}
          PROD_MAIL_BUSINESS: ${{ secrets.MAIL_BUSINESS }}
          PROD_APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
        run: |
          echo "DB_URL=$PROD_DB_URL" >> .env
          echo "DB_USER=$PROD_DB_USER" >> .env
          echo "DB_PASS=$PROD_DB_PASS" >> .env
          echo "JWT_SECRET=$PROD_JWT_SECRET" >> .env
          echo "MAIL_API_URL=https://api.resend.com" >> .env
          echo "MAIL_PASSWORD=$PROD_MAIL_PASSWORD" >> .env
          echo "MAIL_FROM=$PROD_MAIL_FROM" >> .env
          echo "MAIL_BUSINESS=$PROD_MAIL_BUSINESS" >> .env
          echo "APP_CORS_ALLOWED_ORIGINS=$PROD_APP_CORS_ALLOWED_ORIGINS" >> .env
          echo "VITE_API_URL=/v1" >> .env
          echo "SPRING_PROFILES_ACTIVE=prod" >> .env

      - name: Transfere o .env e o Compose para o Servidor via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: dsc.rodrigor.com
          # Usa a chave e o username de deploy que o professor forneceu
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: 22
          # Copia o .env recém-criado e o compose file
          source: ".env, docker-compose.prod.yml"
          # Alvo: A pasta raiz do seu projeto no servidor do professor
          target: "/home/${{ secrets.SSH_USERNAME }}/app/sass-salon" # Ajuste o caminho final se o professor tiver exigido outro diretório base

      - name: Acionar Gatilho de Pull/Deploy no Servidor do Professor
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # O comando exigido pelo professor para forçar o servidor a buscar a nova imagem no GHCR
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"