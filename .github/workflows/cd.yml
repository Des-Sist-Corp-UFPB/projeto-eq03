name: Continuous Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.repo.outputs.repo_lower }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repository Name
        id: repo
        run: |
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/salon-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conecta via SSH e Atualiza
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_DB_URL: ${{ secrets.DB_URL }}
          PROD_DB_USER: ${{ secrets.DB_USER }}
          PROD_DB_PASS: ${{ secrets.DB_PASS }}
          PROD_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PROD_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          PROD_MAIL_FROM: ${{ secrets.MAIL_FROM }}
          PROD_MAIL_BUSINESS: ${{ secrets.MAIL_BUSINESS }}
          PROD_APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          PROD_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROD_GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: PROD_DB_URL,PROD_DB_USER,PROD_DB_PASS,PROD_JWT_SECRET,PROD_MAIL_PASSWORD,PROD_MAIL_FROM,PROD_MAIL_BUSINESS,PROD_APP_CORS_ALLOWED_ORIGINS,PROD_GHCR_TOKEN,PROD_GHCR_USER
          script: |
            mkdir -p /app/sass-salon
            cd /app/sass-salon

            # 1. Limpa os fantasmas
            rm -f .env docker-compose.prod.yml docker-compose.yml docker-compose.override.yml
            unset IMAGE_REPO
            unset COMPOSE_FILE

            # 2. Monta o .env das variáveis secretas do Github
            echo "DB_URL=$PROD_DB_URL" >> .env
            echo "DB_USER=$PROD_DB_USER" >> .env
            echo "DB_PASS=$PROD_DB_PASS" >> .env
            echo "JWT_SECRET=$PROD_JWT_SECRET" >> .env
            echo "MAIL_API_URL=https://api.resend.com" >> .env
            echo "MAIL_PASSWORD=$PROD_MAIL_PASSWORD" >> .env
            echo "MAIL_FROM=$PROD_MAIL_FROM" >> .env
            echo "MAIL_BUSINESS=$PROD_MAIL_BUSINESS" >> .env
            echo "APP_CORS_ALLOWED_ORIGINS=$PROD_APP_CORS_ALLOWED_ORIGINS" >> .env
            echo "VITE_API_URL=/v1" >> .env
            echo "SPRING_PROFILES_ACTIVE=prod" >> .env

            # 3. Baixa o seu docker-compose.prod.yml limpo da versão EXATA do seu commit mais recente
            wget -qO docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.prod.yml

            # 4. Faz login e sobe ignorando o sistema do professor
            echo "$PROD_GHCR_TOKEN" | docker login ghcr.io -u "$PROD_GHCR_USER" --password-stdin
            
            docker compose --env-file /dev/null -f docker-compose.prod.yml pull
            docker compose --env-file /dev/null -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
