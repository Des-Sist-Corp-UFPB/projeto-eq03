name: Continuous Integration

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - '**'

# Cancela builds antigos em execução se novos commits forem enviados para a mesma ref (branch/PR)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # Job 1: Detecção de caminhos modificados para economia de minutos no GitHub Actions
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filtering Check
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'salon-back/**'
            frontend:
              - 'salon-front/**'

  # Job 2: Testes e Validação do Backend (Java/Maven)
  ci-backend:
    name: Backend CI
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Habilita o cache automático de dependências do Maven (~/.m2)

      - name: Build & Run Unit Tests
        run: |
          cd salon-back
          mvn clean test

  # Job 3: Lint e Build de Validação do Frontend (React/Node)
  ci-frontend:
    name: Frontend CI
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Habilita o cache de dependências do npm (~/.npm)
          cache-dependency-path: 'salon-front/package-lock.json'

      - name: Install Dependencies
        run: |
          cd salon-front
          npm ci

      - name: Run Linter
        run: |
          cd salon-front
          npm run lint

      - name: Run Build Check
        run: |
          cd salon-front
          npm run build

  # Job 4: Análise Estática de Código e Vulnerabilidades (CodeQL DevSecOps)
  security:
    name: Security Scan (CodeQL)
    needs: changes
    # Executa se houver modificações em qualquer uma das duas partes principais do monorepo
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        if: ${{ needs.changes.outputs.backend == 'true' }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'salon-front/package-lock.json'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, java
          queries: security-extended,security-and-quality

      # O Autobuild do CodeQL detecta pom.xml do Maven e compila automaticamente o Java
      - name: Autobuild CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
