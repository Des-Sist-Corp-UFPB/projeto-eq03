<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:insert="layout :: head">
    <title>Usuários</title>
</head>
<body>
    <div th:insert="layout :: header"></div>
    
    <div class="container mt-4">
        <main>
            <div class="row mb-4">
                <div class="col-md-6">
                    <h1 class="h3">Usuários</h1>
                </div>
                <div class="col-md-6 text-end">
                    <!--
                      Botão para carregar o formulário de novo usuário via HTMX.
                      - hx-get="/usuarios/novo" faz uma requisição GET ao endpoint
                      - hx-target="#modal-container" injeta a resposta no modal container
                      - O JavaScript no layout.html abre o modal automaticamente
                    -->
                    <button type="button" class="btn btn-primary"
                            hx-get="/usuarios/novo"
                            hx-target="#modal-container"
                            hx-trigger="click">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                             class="bi bi-plus-circle me-1" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                        </svg>
                        Novo Usuário
                    </button>
                </div>
            </div>

            <!--
              Tabela de usuários — carregada como fragmento via HTMX.
              O endpoint POST/PUT/DELETE retorna este fragmento atualizado.
            -->
            <div hx-get="/usuarios" hx-trigger="load" hx-swap="innerHTML">
                <div class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div th:insert="layout :: footer"></div>
    <div th:insert="layout :: scripts"></div>
</body>
</html>
