<!--
  Fragmento do formulário de criação/edição de usuários
  Retornado por GET /usuarios/novo e GET /usuarios/{id}/editar
  Renderizado em um modal Bootstrap via HTMX
-->
<div class="modal fade" id="usuarioModal" tabindex="-1" aria-hidden="true" th:fragment="form">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <!--
                  Título dinâmico: se usuarioId existe, é edição; caso contrário, é criação.
                  th:if / th:unless são directives de condição do Thymeleaf.
                -->
                <h1 class="modal-title fs-5">
                    <span th:if="${usuarioId == null}">Novo Usuário</span>
                    <span th:unless="${usuarioId == null}">Editar Usuário</span>
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <!--
                  Formulário com validação e HTMX.
                  - th:action alterna entre POST (novo) e PUT (edição)
                  - th:if condiciona o método HTTP
                  - @Valid valida os campos no backend
                  - Se houver erros, o fragmento é retornado novamente com mensagens
                -->
                <form th:action="${usuarioId == null} ? @{/usuarios} : @{/usuarios/{id}(id=${usuarioId})}"
                      th:method="${usuarioId == null} ? 'post' : 'put'"
                      th:object="${usuarioForm}"
                      hx-post="@{/usuarios}"
                      th:hx-put="@{/usuarios/{id}(id=${usuarioId})}"
                      th:if="${usuarioId == null}"
                      hx-target="#modal-container"
                      hx-swap="none"
                      class="needs-validation">

                    <!-- Campo: Matrícula -->
                    <div class="mb-3">
                        <label for="matricula" class="form-label">Matrícula <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               id="matricula"
                               th:field="*{matricula}"
                               th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                               placeholder="Digite a matrícula"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('matricula')}">
                            <span th:errors="*{matricula}"></span>
                        </div>
                    </div>

                    <!-- Campo: Nome Completo -->
                    <div class="mb-3">
                        <label for="nomeCompleto" class="form-label">Nome Completo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               id="nomeCompleto"
                               th:field="*{nomeCompleto}"
                               th:classappend="${#fields.hasErrors('nomeCompleto')} ? 'is-invalid'"
                               placeholder="Digite o nome completo"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nomeCompleto')}">
                            <span th:errors="*{nomeCompleto}"></span>
                        </div>
                    </div>

                    <!-- Campo: Senha -->
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha <span class="text-danger">*</span></label>
                        <input type="password" class="form-control"
                               id="senha"
                               th:field="*{senha}"
                               th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'"
                               placeholder="Digite a senha (mín. 6 caracteres)"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('senha')}">
                            <span th:errors="*{senha}"></span>
                        </div>
                    </div>

                    <!-- Campo: Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email (opcional)</label>
                        <input type="email" class="form-control"
                               id="email"
                               th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="Digite o email">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                            <span th:errors="*{email}"></span>
                        </div>
                    </div>

                    <!-- Campo: Ativo (checkbox) -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input"
                               id="ativo"
                               th:field="*{ativo}"
                               th:checked="${ativo != null ? ativo : true}">
                        <label class="form-check-label" for="ativo">
                            Usuário Ativo
                        </label>
                    </div>

                    <!-- Botões de ação -->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">
                            <span th:if="${usuarioId == null}">Criar</span>
                            <span th:unless="${usuarioId == null}">Atualizar</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!--
  Formulário alternativo para edição (PUT)
  Este formulário é renderizado quando usuarioId está presente.
-->

            <div class="modal-body">
                <form th:action="@{/usuarios/{id}(id=${usuarioId})}"

                      th:object="${usuarioForm}"

                               th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('matricula')}">
                            <span th:errors="*{matricula}"></span>
                        </div>
                    </div>

                    <!-- Campo: Nome Completo -->
                    <div class="mb-3">
                        <label for="nomeCompletoEdit" class="form-label">Nome Completo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               id="nomeCompletoEdit"
                               th:field="*{nomeCompleto}"
                               th:classappend="${#fields.hasErrors('nomeCompleto')} ? 'is-invalid'"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nomeCompleto')}">
                            <span th:errors="*{nomeCompleto}"></span>
                        </div>
                    </div>

                    <!-- Campo: Senha -->
                    <div class="mb-3">
                        <label for="senhaEdit" class="form-label">Senha <span class="text-danger">*</span></label>
                        <input type="password" class="form-control"
                               id="senhaEdit"
                               th:field="*{senha}"
                               th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'"
                               required>

                    </div>

                    <!-- Campo: Email -->
                    <div class="mb-3">

                        <input type="email" class="form-control"
                               id="emailEdit"

                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                            <span th:errors="*{email}"></span>
                        </div>
                    </div>

                    <!-- Campo: Ativo -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input"
                               id="ativoEdit"
                               th:field="*{ativo}">
                        <label class="form-check-label" for="ativoEdit">
                            Usuário Ativo
                        </label>
                    </div>

                    <!-- Botões de ação -->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Atualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
