<!DOCTYPE html>
<!--
  Layout base da aplicação — todas as páginas inserem seus fragmentos.
  
  Uso: 
  - <div th:insert="layout :: head"></div> — insere meta, CSS, title
  - <div th:insert="layout :: header"></div> — insere navbar completa
  - <div th:insert="layout :: footer"></div> — insere footer
  - <div th:insert="layout :: scripts"></div> — insere scripts ao final
-->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ============================================================
     FRAGMENT: head — Meta tags, CSS, title
     ============================================================ -->
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo != null ? titulo + ' — Chamados DSC' : 'Chamados DSC'}">Chamados DSC</title>

    <!--
      Bootstrap CSS via WebJars.
      O webjars-locator-core permite omitir a versão na URL — o Spring a resolve automaticamente.
      Sem o locator, precisaríamos: /webjars/bootstrap/5.3.3/css/bootstrap.min.css
    -->
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>

    <!-- Estilo customizado mínimo -->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .table-hover tbody tr:hover {
            background-color: #e9ecef;
        }
        /* Indicador de carregamento HTMX */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
</head>

<!-- ============================================================
     FRAGMENT: header — Navbar completa
     ============================================================ -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4" th:fragment="header">
    <div class="container">
        <!-- Marca / Logo -->
        <a class="navbar-brand" th:href="@{/usuarios}">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                 class="bi bi-ticket me-2" viewBox="0 0 16 16">
                <path d="M2.5 1A1.5 1.5 0 0 1 4 2.5V4h10.5A1.5 1.5 0 0 1 16 5.5v5a1.5 1.5 0 0 1-1.5 1.5H4v1.5a1.5 1.5 0 0 1-1.5 1.5h-1A1.5 1.5 0 0 1 0 13.5v-12A1.5 1.5 0 0 1 1.5 0h1ZM1.5 1a.5.5 0 0 0-.5.5v12a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5V2a.5.5 0 0 0-.5-.5h-1Zm1.5 3a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5H4Z"/>
            </svg>
            Chamados DSC
        </a>

        <!-- Botão hamburger para mobile -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links de navegação -->
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <!--
                      th:classappend adiciona a classe "active" dinamicamente se a URL atual
                      começa com /usuarios — indica visualmente a página atual.
                    -->
                    <a class="nav-link"
                       th:classappend="${requestURI != null and requestURI.startsWith('/usuarios')} ? 'active'"
                       th:href="@{/usuarios}">
                        Usuários
                    </a>
                </li>
            </ul>

            <!-- Área do usuário logado (direita da navbar) -->
            <ul class="navbar-nav">
                <!--
                  sec:authorize="isAuthenticated()" — dialeto do Thymeleaf Security.
                  Este bloco só é renderizado se o usuário estiver autenticado.
                  Requer a dependência: thymeleaf-extras-springsecurity6
                -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#"
                       id="navbarUser" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">Usuário</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarUser">
                        <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ============================================================
     FRAGMENT: footer — Rodapé
     ============================================================ -->
<footer class="bg-light border-top mt-5 py-3" th:fragment="footer">
    <div class="container text-center text-muted small">
        <p class="mb-0">
            DSC — Desenvolvimento de Sistemas Corporativos |
            Prof. Rodrigo Rebouças | UFPB Campus IV
        </p>
    </div>
</footer>

<!-- ============================================================
     FRAGMENT: scripts — Scripts ao final do body
     ============================================================ -->
<div th:fragment="scripts">
    <!--
      Bootstrap JS (Bundle com Popper.js incluído) via WebJars.
      Necessário para: modais, dropdowns, collapse (navbar mobile), etc.
    -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <!--
      HTMX via WebJars.
      HTMX adiciona comportamento AJAX a elementos HTML via atributos hx-*.
      Sem escrever nenhum JavaScript, você consegue:
      - hx-get, hx-post, hx-put, hx-delete: fazer requisições HTTP
      - hx-target: onde inserir a resposta
      - hx-swap: como substituir o conteúdo (innerHTML, outerHTML, beforeend, etc.)
      - hx-trigger: quando disparar a requisição (click, keyup, etc.)
    -->
    <script src="/webjars/htmx.org/2.0.4/dist/htmx.min.js"></script>

    <!--
      Container do modal — usado pelo HTMX para injetar o modal de formulário.
      O HTMX carrega o HTML do modal aqui e, após injetar, o Bootstrap o exibe.
    -->
    <div id="modal-container"></div>

    <!--
      Script para abrir o modal automaticamente após o HTMX injectá-lo no DOM.
      htmx:afterSwap é disparado após o HTMX substituir o conteúdo.
    -->
    <script>
        /**
         * Autentica HTMX.
         * Adiciona o token JWT ao header Authorization de todas as requisições HTMX.
         * O token é armazenado em localStorage durante o login.
         */
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('authToken');
            if (token) {
                evt.detail.headers['Authorization'] = 'Bearer ' + token;
            }
        });

        /**
         * Trata erros de autenticação do HTMX.
         * Se receber 403 (Forbidden) ou 401 (Unauthorized), limpa token e redireciona para /login.
         */
        document.addEventListener('htmx:responseError', function(evt) {
            if (evt.detail.xhr.status === 403 || evt.detail.xhr.status === 401) {
                console.warn('Erro de autenticação:', evt.detail.xhr.status);
                localStorage.removeItem('authToken');
                localStorage.removeItem('userMatricula');
                localStorage.removeItem('userName');
                window.location.href = '/login';
            }
        });

        // Abre o modal Bootstrap após o HTMX injetar o HTML no #modal-container
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'modal-container') {
                const modalEl = document.getElementById('usuarioModal');
                if (modalEl) {
                    const modal = new bootstrap.Modal(modalEl);
                    modal.show();
                }
            } else if (evt.detail.target.id === 'tabela-usuarios') {
                const modalEl = document.getElementById('usuarioModal');
                if (modalEl) {
                    const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                    modalEl.addEventListener('hidden.bs.modal', function() {
                        const modalContainer = document.getElementById('modal-container');
                        if (modalContainer) {
                            modalContainer.innerHTML = '';
                        }
                    }, { once: true });
                    modal.hide();
                }
            }
        });
        
        /**
         * Logout: limpa token e redireciona para /login
         */
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userMatricula');
            localStorage.removeItem('userName');
            window.location.href = '/login';
        }
    </script>
</div>

</html>
