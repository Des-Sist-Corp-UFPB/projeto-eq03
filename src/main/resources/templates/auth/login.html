<!DOCTYPE html>
<!--
  Página de login customizada para o Spring Security.

  Spring Security Form Login:
  - O formulário DEVE fazer POST para /login (URL padrão do Spring Security).
  - Os campos DEVEM ter name="username" e name="password" (padrão do Spring Security).
  - O campo _csrf protege contra ataques CSRF — o Thymeleaf injeta o token automaticamente
    quando você usa th:action="@{/login}".
  - O Spring Security redireciona para /login?error em caso de falha.
  - O Spring Security redireciona para /login?logout após o logout.
-->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Chamados DSC</title>
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.3);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border-radius: 1rem 1rem 0 0;
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            font-size: 0.875rem;
            opacity: 0.85;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="login-card bg-white">

    <!-- Cabeçalho do card -->
    <div class="login-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="white"
             class="bi bi-ticket mb-2" viewBox="0 0 16 16">
            <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H2zm11 1a1 1 0 0 1 1 1v.5H2V6a1 1 0 0 1 1-1h10z" />
            <path d="M2 7.5a1 1 0 0 0-1 1V12a1 1 0 0 0 1 1h.5a.5.5 0 0 1 0 1H2a2 2 0 0 1-2-2V8.5a2 2 0 0 1 2-2h.5a.5.5 0 0 1 0 1H2z" />
            <path d="m14 8.5-.5-.5h.5a.5.5 0 0 1 0 1h-.5l.5-.5zm0 3-.5-.5h.5a.5.5 0 0 1 0 1h-.5l.5-.5z" />
            <path d="M14 7.5a2 2 0 0 1 2 2v3.5a2 2 0 0 1-2 2h-.5a.5.5 0 0 0 0-1H14a1 1 0 0 0 1-1v-3.5a1 1 0 0 0-1-1h-.5a.5.5 0 0 0 0-1h.5z" />
        </svg>
        <h1>Chamados DSC</h1>
        <p>Desenvolvimento de Sistemas Corporativos — UFPB Campus IV</p>
    </div>

    <!-- Corpo do card com o formulário -->
    <div class="card-body p-4">

        <!--
          Mensagem de erro — exibida quando o Spring Security adiciona ?error na URL.
          th:if="${param.error}" verifica se o parâmetro "error" existe na query string.
          O Spring Security redireciona para /login?error quando as credenciais são inválidas.
        -->
        <div th:if="${param.error}"
             class="alert alert-danger d-flex align-items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
            </svg>
            <div>Usuário ou senha inválidos. Tente novamente.</div>
        </div>

        <!--
          Mensagem de sucesso no logout — exibida quando o Spring Security adiciona ?logout na URL.
          Redireciona para /login?logout após logout bem-sucedido (configurado em SecurityConfig).
        -->
        <div th:if="${param.logout}"
             class="alert alert-success d-flex align-items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-check-circle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
            <div>Logout realizado com sucesso!</div>
        </div>

        <h2 class="h5 text-center mb-4 text-muted">Acesse sua conta</h2>

        <!--
          Formulário de login JWT.
          
          Este formulário faz POST para /api/auth/login (endpoint JSON) em vez de usar
          o formulário padrão do Spring Security (que vai para /login).
          
          Fluxo:
          1. Usuário preenche usuário e senha
          2. JavaScript intercepta o submit e envia para /api/auth/login (JSON)
          3. API retorna JWT no campo "token"
          4. Armazena token em localStorage
          5. Redireciona para /usuarios (página autenticada)
          6. SecurityFilter valida token em cada requisição
        -->
        <form id="loginForm">

            <!-- Campo usuário -->
            <div class="mb-3">
                <label for="matricula" class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                        </svg>
                    </span>
                    <input type="text"
                           id="matricula"
                           name="matricula"
                           class="form-control"
                           placeholder="Digite seu usuário"
                           required
                           autofocus/>
                </div>
            </div>

            <!-- Campo senha -->
            <div class="mb-4">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             fill="currentColor" class="bi bi-lock" viewBox="0 0 16 16">
                            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2M5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1"/>
                        </svg>
                    </span>
                    <input type="password"
                           id="senha"
                           name="senha"
                           class="form-control"
                           placeholder="Digite sua senha"
                           required/>
                </div>
            </div>

            <!-- Botão de login -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                         fill="currentColor" class="bi bi-box-arrow-in-right me-2" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0z"/>
                        <path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                    </svg>
                    <span id="btnText">Entrar</span>
                </button>
            </div>

        </form>

        <!-- Dica de credenciais (apenas em desenvolvimento) -->
        <div class="mt-3 p-2 bg-light rounded border text-center">
            <small class="text-muted">
                <strong>Desenvolvimento:</strong> admin / admin123
            </small>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

<script>
    /**
     * Autenticação JWT via API REST.
     * 
     * Em vez de usar o formulário padrão do Spring Security (que usa sessões),
     * este formulário faz uma requisição JSON para /api/auth/login e armazena
     * o JWT em localStorage.
     */
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const matricula = document.getElementById('matricula').value.trim();
        const senha = document.getElementById('senha').value;
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        
        // Validação básica
        if (!matricula || !senha) {
            alert('Preencha todos os campos!');
            return;
        }
        
        // Desabilita botão e mostra loading
        submitBtn.disabled = true;
        btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Autenticando...';
        
        try {
            // POST para /api/auth/login com JSON
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    matricula: matricula,
                    senha: senha
                })
            });
            
            if (response.ok) {
                // Sucesso: armazena token e redireciona
                const data = await response.json();
                const token = data.token;
                
                // Armazena token em localStorage (para requisições AJAX com header Authorization)
                localStorage.setItem('authToken', token);
                localStorage.setItem('userMatricula', data.matricula);
                localStorage.setItem('userName', data.nomeCompleto);
                
                // Também armazena em cookie (para que navegação entre páginas funcione)
                document.cookie = `authToken=${token}; path=/; SameSite=Lax; max-age=3600`;
                
                // Log para debug
                console.log('Login bem-sucedido. Redirecionando para /usuarios...');
                
                // Redireciona para página autenticada
                window.location.href = '/usuarios';
            } else if (response.status === 401) {
                // Credenciais inválidas
                alert('Usuário ou senha incorretos!');
                document.getElementById('senha').value = '';
                document.getElementById('matricula').focus();
            } else {
                // Outro erro
                alert('Erro na autenticação. Tente novamente.');
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro de conexão. Verifique se o servidor está rodando.');
        } finally {
            // Reabilita botão
            submitBtn.disabled = false;
            btnText.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-in-right me-2" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0z"/><path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/></svg>Entrar';
        }
    });
});
    
/**
 * Quando o token é armazenado em localStorage, o SecurityFilter
 * (OncePerRequestFilter) o lê do header Authorization em cada requisição:
 * Authorization: Bearer <token>
 * 
 * Ver: SecurityFilter.doFilterInternal()
 */
</script>

</body>
</html>
