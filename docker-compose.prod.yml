services:
  salon-back:
    image: ghcr.io/elksandro2/sass-salon/salon-back:latest
    container_name: salon-back
    env_file:
      - .env
    restart: always
    networks:
      - salon-network

  salon-front:
    image: ghcr.io/elksandro2/sass-salon/salon-front:latest
    container_name: salon-front
    env_file:
      - .env
    depends_on:
      - salon-back
    restart: always
    networks:
      - salon-network

volumes: {}

networks:
  salon-network:
    external: true
